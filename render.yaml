# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — Krushak MERN PWA
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys two services from this monorepo:
#   • krushak-server  → Node.js Web Service  (backend API)
#   • krushak-client  → Static Site           (React/Vite PWA)
#
# HOW TO USE
# ──────────
# 1. Push this repo to GitHub / GitLab.
# 2. Go to https://dashboard.render.com → New → Blueprint.
# 3. Connect your repo — Render will detect this file automatically.
# 4. After the first deploy, set the SECRET env vars in each service's
#    Environment tab (MONGO_URI, JWT_SECRET, API keys, etc.).
# 5. Copy the krushak-server URL → set as VITE_API_BASE_URL in krushak-client.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: krushak-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render assigns a PORT automatically; the default is 10000.
      # Our server reads process.env.PORT (via env.js), so no override needed.
      - key: MONGO_URI
        sync: false   # ← Set this secret in the Render dashboard
      - key: JWT_SECRET
        sync: false   # ← Set this secret in the Render dashboard
      # Set CLIENT_ORIGIN to your krushak-client static site URL, e.g.:
      # https://krushak-client.onrender.com
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: GNEWS_API_KEY
        sync: false
      - key: GNEWS_COUNTRY
        value: in
      - key: NEWSDATA_API_KEY
        sync: false
      - key: MANDI_API_KEY
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: krushak-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA fallback — all routes serve index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your krushak-server URL BEFORE the first deploy, e.g.:
      # https://krushak-server.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false
